data_root: ./data
results_root: ./results
vix_file: ./data/VIX_2024-01-01_2026-06-10_eod.parquet

tickers:
  - AAPL
  - MSFT
  - NVDA
  - AMZN
  - JPM
  - GS
  - CVX
  - XOM
  - PG
  - UNH

sectors:
  Tech:       [AAPL, MSFT, NVDA]
  Consumer:   [AMZN, PG]
  Financials: [JPM, GS]
  Energy:     [CVX, XOM]
  Healthcare: [UNH]

start_date: 2023-06-27
end_date:   2026-03-10

calibration:
  loss: iv_vega
  maxiter: 700
  method: L-BFGS-B
  r_annual: 0.0
  n_starts:
    heston93: 3
    hn2000:   7
    chj2009:  7
  seed: 42

filters:
  min_price: 0.10
  max_rel_spread: 0.25
  min_dte: 7
  max_dte: 365
  min_moneyness: 0.7
  max_moneyness: 1.3
  min_volume: 1

hn_warmup:
  window_days: 252

oos:
  horizons: [1, 3, 7, 15]
  n_days_per_period: 2
  test_months:
    calm:     [2024-06-01]   # VIX 12.7
    normal:   [2024-10-01]   # VIX 20.0
    stressed: [2025-04-01]   # VIX 32.0

models:
  - heston93
  - hn2000
  - chj2009
